<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎲 Dice Roller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    p.subtitle { color: #aaa; margin-bottom: 2rem; }
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    label { font-size: 1rem; }
    input[type=number] {
      width: 60px;
      padding: 0.4rem;
      border-radius: 6px;
      border: none;
      text-align: center;
      font-size: 1rem;
    }
    button {
      padding: 0.7rem 2rem;
      font-size: 1.1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #c73652; }
    .dice-tray {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      max-width: 600px;
      margin-bottom: 1.5rem;
    }
    .die {
      width: 80px;
      height: 80px;
      background: white;
      color: #1a1a2e;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      animation: pop 0.3s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .total {
      font-size: 1.4rem;
      color: #e94560;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🎲 Dice Roller</h1>
  <p class="subtitle">Standard D6</p>
  <div class="controls">
    <label for="count">Number of dice:</label>
    <input type="number" id="count" value="1" min="1" max="10" />
    <button onclick="rollDice()">Roll!</button>
  </div>
  <div class="dice-tray" id="tray"></div>
  <div class="total" id="total"></div>

  <script>
    const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
    function rollDice() {
      const count = Math.min(10, Math.max(1, parseInt(document.getElementById('count').value) || 1));
      const tray = document.getElementById('tray');
      const totalEl = document.getElementById('total');
      tray.innerHTML = '';
      let sum = 0;
      for (let i = 0; i < count; i++) {
        const val = Math.floor(Math.random() * 6) + 1;
        sum += val;
        const die = document.createElement('div');
        die.className = 'die';
        die.textContent = faces[val - 1];
        tray.appendChild(die);
      }
      totalEl.textContent = count > 1 ? `Total: ${sum}` : '';
    }
  </script>
</body>
</html>
